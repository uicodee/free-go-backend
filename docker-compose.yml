version: '3.9'

services:
  app:
    build: .
    container_name: free-go-app
    ports:
      - '${APP_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_started
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-freego}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
        labels: 'service'
    labels:
      - 'service=app'

  postgres:
    image: postgres:15-alpine
    container_name: free-go-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-freego}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  adminer:
    image: adminer:latest
    container_name: free-go-adminer
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - '${ADMINER_PORT:-8080}:8080'
    restart: unless-stopped

volumes:
  postgres_data:
